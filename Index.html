<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(170deg, #ecfdf5 0%, #f0fdf4 30%, #fefce8 100%);
      color: #1b4332;
    }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #2d6a4f !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* ─── Header ─── */
    .header {
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
      padding: 22px 16px 18px; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    .header-inner { max-width: 800px; margin: 0 auto; }
    .header h1 { color: #fff; font-size: 24px; font-weight: 900; letter-spacing: -0.02em; }
    .header .subtitle { color: rgba(255,255,255,0.65); font-size: 14px; margin-top: 3px; font-weight: 600; }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .btn-back {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; color: #fff; padding: 7px 14px; cursor: pointer;
      font-size: 15px; font-weight: 600; font-family: 'Nunito', sans-serif;
    }
    .student-badge {
      margin-top: 10px; padding: 8px 14px; background: rgba(255,255,255,0.12);
      border-radius: 10px; display: flex; align-items: center; gap: 10px;
    }
    .student-badge .name { color: #fff; font-weight: 700; font-size: 16px; }
    .student-badge .meta { color: rgba(255,255,255,0.6); font-size: 13px; }
    .badge-dirty {
      margin-left: auto; background: #fbbf24; color: #78350f;
      padding: 2px 10px; border-radius: 20px; font-size: 13px; font-weight: 700;
    }

    /* ─── Content ─── */
    .content { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; }
    .content-with-nav { max-width: 1100px; margin: 0 auto; padding: 20px 16px 100px; display: flex; gap: 16px; }
    .content-main { flex: 1; min-width: 0; }

    /* ─── Side Nav ─── */
    .side-nav {
      width: 200px; flex-shrink: 0; position: sticky; top: 110px; align-self: flex-start;
      background: #fff; border-radius: 14px; border: 1px solid #e5e7eb;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden;
      max-height: calc(100vh - 130px); overflow-y: auto;
    }
    .side-nav-title {
      padding: 10px 14px; background: #f3f4f6; font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280;
    }
    .side-nav a {
      display: block; padding: 8px 14px; font-size: 13px; font-weight: 600;
      color: #374151; text-decoration: none; border-left: 3px solid transparent;
      transition: all 0.15s; cursor: pointer;
    }
    .side-nav a:hover { background: #f0fdf4; color: #2d6a4f; }
    .side-nav a.nav-area { font-weight: 700; color: #1b4332; padding-left: 14px; }
    .side-nav a.nav-section { padding-left: 20px; font-size: 12px; color: #6b7280; }
    @media (max-width: 860px) { .side-nav { display: none; } .content-with-nav { max-width: 800px; } }

    /* ─── Cards ─── */
    .card {
      background: #fff; border-radius: 16px; border: 1px solid #e5e7eb;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 18px; overflow: hidden;
    }
    .card-body { padding: 20px; }
    .card-title {
      font-size: 17px; font-weight: 800; color: #1b4332;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .card-icon {
      width: 26px; height: 26px; border-radius: 8px; background: #d1fae5;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }

    /* ─── Form Fields ─── */
    .field-label {
      font-size: 13px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.08em; color: #374151; margin-bottom: 5px; display: block;
    }
    .field-input, .field-select {
      width: 100%; padding: 11px 14px; border-radius: 12px;
      border: 1.5px solid #e5e7eb; font-size: 16px;
      font-family: 'Nunito', sans-serif; transition: border-color 0.2s;
    }
    .field-select { appearance: auto; cursor: pointer; background: #fff; }
    .field-input:read-only { background: #f9fafb; color: #6b7280; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ─── Student List ─── */
    .student-list-header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #065f46 0%, #047857 100%);
      display: flex; justify-content: space-between; align-items: center;
    }
    .student-list-header h2 { color: #fff; font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .btn-new {
      background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 10px; color: #fff; padding: 6px 14px; cursor: pointer;
      font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif;
    }
    .search-input {
      width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e5e7eb;
      font-size: 15px; font-family: 'Nunito', sans-serif; margin-bottom: 10px;
    }
    .student-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 10px; border: 1.5px solid #f3f4f6;
      background: #fff; cursor: pointer; font-family: 'Nunito', sans-serif;
      transition: all 0.15s; width: 100%; text-align: left; margin-bottom: 6px;
    }
    .student-item:hover { border-color: #86efac; background: #f0fdf4; }
    .student-item.selected { border: 2px solid #2d6a4f; background: #f0fdf4; }
    .student-item .name { font-weight: 700; font-size: 16px; color: #1b4332; }
    .student-item .course { font-size: 14px; color: #6b7280; margin-top: 2px; }
    .program-badge {
      background: #d1fae5; color: #065f46; padding: 3px 10px;
      border-radius: 20px; font-size: 13px; font-weight: 700;
    }
    .student-list-body { padding: 12px 16px; max-height: 300px; overflow-y: auto; }

    /* ─── Objective Cards ─── */
    .obj-card { background: #fff; overflow: hidden; }
    .obj-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer;
    }
    .obj-num {
      background: rgba(255,255,255,0.25); border-radius: 50%;
      width: 30px; height: 30px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-weight: 800; font-size: 14px; flex-shrink: 0;
    }
    .obj-title-text { color: #fff; font-weight: 700; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .obj-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .obj-body.hidden { display: none; }
    .obj-toggle { color: #fff; font-size: 16px; transition: transform 0.3s; }
    .obj-toggle.collapsed { transform: rotate(-90deg); }

    .btn-remove-obj {
      background: rgba(255,255,255,0.2); border: none; border-radius: 8px;
      color: #fff; padding: 4px 10px; cursor: pointer; font-size: 14px;
      font-family: 'Nunito', sans-serif;
    }

    /* ─── Sections inside objectives ─── */
    .section { border-radius: 12px; padding: 12px 14px; }
    .section-indicators { background: #fef3c7; }
    .section-contents { background: #ede9fe; }
    .section-activities { background: #dbeafe; }
    .section-label { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .section-indicators .section-label { color: #92400e; }
    .section-contents .section-label { color: #5b21b6; }
    .section-activities .section-label { color: #1e40af; }

    /* ─── Dynamic list items ─── */
    .list-item { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; }
    .list-num {
      min-width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; margin-top: 9px; flex-shrink: 0; color: #374151;
    }
    .section-indicators .list-num { background: #fde68a; }
    .section-contents .list-num { background: #ddd6fe; }
    .section-activities .list-num { background: #bfdbfe; }
    .list-textarea {
      flex: 1; padding: 8px 12px; border-radius: 10px; border: 1.5px solid #e5e7eb;
      font-size: 15px; resize: vertical; font-family: 'Nunito', sans-serif;
      line-height: 1.5; min-height: 38px;
    }
    .eval-select {
      width: 56px; padding: 6px 2px; border-radius: 8px; border: 1.5px solid #e5e7eb;
      font-size: 12px; font-family: 'Nunito', sans-serif; font-weight: 700;
      text-align: center; cursor: pointer; background: #fff; flex-shrink: 0; margin-top: 5px;
    }
    .eval-select.eval-ni { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
    .eval-select.eval-ep { background: #fef3c7; border-color: #fde68a; color: #92400e; }
    .eval-select.eval-c { background: #d1fae5; border-color: #86efac; color: #065f46; }
    .eval-group { display: flex; gap: 4px; flex-shrink: 0; margin-top: 5px; }
    .eval-label { font-size: 11px; font-weight: 700; color: #6b7280; text-align: center; }
    .btn-remove-item {
      width: 26px; height: 26px; border-radius: 50%; border: none;
      background: #fee2e2; color: #dc2626; cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 7px; flex-shrink: 0;
    }
    .btn-add-item {
      align-self: flex-start; padding: 5px 12px; border-radius: 20px;
      border: 1.5px dashed #9ca3af; background: transparent;
      color: #6b7280; font-size: 14px; cursor: pointer; font-family: 'Nunito', sans-serif;
      margin-top: 2px;
    }
    .btn-add-item:hover { border-color: #2d6a4f; color: #2d6a4f; }

    /* ─── Follow-up fields ─── */
    .followup-card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 14px; overflow: hidden; }
    .followup-header {
      padding: 10px 16px; font-weight: 800; font-size: 14px; color: #fff;
      background: linear-gradient(135deg, #374151, #4b5563);
    }
    .followup-body { padding: 14px 16px; }
    .followup-textarea {
      width: 100%; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e5e7eb;
      font-size: 14px; font-family: 'Nunito', sans-serif; line-height: 1.6;
      resize: none; overflow: hidden; min-height: 60px;
    }

    /* ─── Rich text toolbar ─── */
    .richtext-wrap { border: 1.5px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .richtext-toolbar {
      display: flex; gap: 2px; padding: 4px 8px; background: #f9fafb; border-bottom: 1px solid #e5e7eb;
    }
    .richtext-toolbar button {
      background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 10px;
      cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: #374151;
    }
    .richtext-toolbar button:hover { background: #f0fdf4; border-color: #86efac; }
    .richtext-editor {
      min-height: 60px; padding: 10px 14px; font-size: 14px; font-family: 'Nunito', sans-serif;
      line-height: 1.6; outline: none; overflow-y: auto;
    }
    .richtext-editor:focus { background: #fefffe; }
    .richtext-editor ul, .richtext-editor ol { margin-left: 20px; }

    /* ─── Indicator observations ─── */
    .ind-obs-textarea {
      width: 100%; padding: 6px 10px; border-radius: 8px; border: 1px solid #e5e7eb;
      font-size: 13px; font-family: 'Nunito', sans-serif; line-height: 1.4;
      resize: none; overflow: hidden; min-height: 30px; margin-top: 4px;
      background: #fffbeb; color: #78350f;
    }

    /* ─── Informe familias ─── */
    .informe-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    .informe-table th, .informe-table td { border: 1px solid #d1d5db; padding: 8px 10px; text-align: center; vertical-align: middle; }
    .informe-table th { background: #f3f4f6; font-weight: 700; }
    .informe-table td:first-child { text-align: left; }
    .informe-level-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #e5e7eb;
      background: #fff; cursor: pointer; font-size: 20px; transition: all 0.15s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .informe-level-btn:hover { transform: scale(1.15); }
    .informe-level-btn.active { border-color: #2d6a4f; box-shadow: 0 0 0 3px rgba(45,106,79,0.2); transform: scale(1.15); }

    /* ─── Add objective ─── */
    .btn-add-obj {
      width: 100%; padding: 14px; margin-top: 0;
      background: rgba(255,255,255,0.6);
      cursor: pointer; font-size: 16px; font-weight: 700; color: #374151;
      font-family: 'Nunito', sans-serif;
    }
    .btn-add-obj:hover { background: #f3f4f6; }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
      border-top: 1px solid #e5e7eb; padding: 10px 16px;
      display: flex; justify-content: center; gap: 8px; z-index: 50;
    }
    .btn { padding: 10px 16px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
    .btn-secondary { border: 1.5px solid #d1d5db; background: #fff; color: #6b7280; }
    .btn-undo {
      border: 1.5px solid #f59e0b; background: #fffbeb; color: #92400e;
    }
    .btn-undo:disabled { border-color: #d1d5db; background: #f9fafb; color: #d1d5db; cursor: not-allowed; }
    .btn-print { border: 1.5px solid #2d6a4f; background: #f0fdf4; color: #2d6a4f; }
    .btn-primary {
      border: none; background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff; font-weight: 800; padding: 10px 24px;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
    }
    .btn-primary:disabled { background: #9ca3af; box-shadow: none; cursor: not-allowed; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #fff; padding: 10px 22px; border-radius: 14px; font-size: 15px; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 999;
      animation: slideUp 0.3s ease;
    }
    .toast-success { background: #065f46; }
    .toast-error { background: #991b1b; }
    .toast-info { background: #1e40af; }
    @keyframes slideUp { from { opacity:0; transform:translate(-50%,20px); } to { opacity:1; transform:translate(-50%,0); } }

    /* ─── Settings Panel ─── */
    .settings-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 200; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .settings-panel {
      background: #fff; border-radius: 16px; max-width: 480px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2); overflow: hidden;
    }
    .settings-header {
      padding: 16px 20px; background: linear-gradient(135deg, #1b4332, #2d6a4f);
      color: #fff; font-weight: 800; font-size: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .settings-footer { padding: 14px 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px; }

    /* ─── Course Filter ─── */
    .course-filters {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .course-chip {
      padding: 5px 14px; border-radius: 20px; border: 1.5px solid #d1d5db;
      background: #fff; color: #6b7280; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s;
    }
    .course-chip:hover { border-color: #86efac; color: #2d6a4f; }
    .course-chip.active { background: #2d6a4f; color: #fff; border-color: #2d6a4f; }
    .btn-settings {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; color: #fff; padding: 7px 12px; cursor: pointer;
      font-size: 16px; font-family: 'Nunito', sans-serif;
    }

    /* ─── Loading ─── */
    .loading { text-align: center; padding: 40px; color: #6b7280; font-size: 16px; }
    .loading .icon { font-size: 32px; margin-bottom: 12px; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Print View ─── */
    .print-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .print-container {
      background: #fff; border-radius: 16px; max-width: 800px; width: 100%;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .print-toolbar {
      padding: 14px 20px; border-bottom: 1px solid #e5e7eb;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: #fff; border-radius: 16px 16px 0 0; z-index: 2;
    }
    .print-content { padding: 30px; }
    .print-content h2 { font-size: 18px; text-align: center; margin-bottom: 4px; }
    .print-content .print-subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .print-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; margin-bottom: 24px; font-size: 13px; }
    .print-meta span { font-weight: 700; }

    .print-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
    .print-table th { background: #e5e7eb; padding: 8px 10px; border: 1px solid #9ca3af; font-weight: 700; text-align: left; }
    .print-table td { padding: 7px 10px; border: 1px solid #9ca3af; vertical-align: top; }
    .print-table .eval-col { width: 44px; text-align: center; }
    .print-table .obj-row td { background: #e5e7eb; font-weight: 800; }
    .print-table .type-content { background: #ede9fe; font-weight: 700; color: #5b21b6; }
    .print-table .type-activity { background: #dbeafe; font-weight: 700; color: #1e40af; }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
      body { background: #fff !important; }
      .header, .bottom-bar, .print-toolbar, .content, .content-with-nav { display: none !important; }
      .print-overlay { position: static; background: none; padding: 0; }
      .print-container { max-height: none; box-shadow: none; border-radius: 0; }
      .print-content { padding: 20px; }
      .print-table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

  <!-- ═══════ HEADER ═══════ -->
  <div class="header">
    <div class="header-inner">
      <div class="header-row">
        <div>
          <h1>Programas de Atención a la Diversidad</h1>
          <div class="subtitle">Gestión de programas individualizados</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-settings" id="btnSettings" onclick="openSettings()" title="Ajustes del centro">⚙</button>
          <button class="btn-back" id="btnBack" style="display:none" onclick="goBack()">← Alumnos</button>
        </div>
      </div>
      <div class="student-badge" id="studentBadge" style="display:none">
        <span style="font-size:18px">👤</span>
        <div>
          <div class="name" id="badgeName"></div>
          <div class="meta" id="badgeMeta"></div>
        </div>
        <span class="badge-dirty" id="badgeDirty" style="display:none">Sin guardar</span>
      </div>
    </div>
  </div>

  <!-- ═══════ CONTENT ═══════ -->
  <div class="content" id="content">
    <!-- Filled by JS -->
  </div>

  <!-- ═══════ BOTTOM BAR ═══════ -->
  <div class="bottom-bar" id="bottomBar" style="display:none">
    <button class="btn btn-undo" id="btnUndo" onclick="undo()" disabled>↩ Deshacer</button>
    <button class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
    <button class="btn btn-print" onclick="showPrintView()">🖨 Imprimir</button>
    <button class="btn btn-primary" id="btnSave" onclick="saveData()">💾 Guardar</button>
  </div>

  <!-- ═══════ TOAST ═══════ -->
  <div id="toast" class="toast" style="display:none"></div>

  <script>
    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    let state = {
      view: 'list', // 'list' | 'form'
      students: [],
      selectedStudent: null,
      isNew: false,
      dirty: false,
      saving: false,
      // Form data
      studentName: '',
      course: '',
      areas: [], // [{name, objectives: [{id,title,indicators,contents,activities}]}]
      // Follow-up text fields
      valoracionInicial: '',
      seguimiento1T: '',
      seguimiento2T: '',
      seguimiento3T: '',
      // Config
      config: { centro: '', localidad: '', cursoEscolar: '' },
      courseFilter: 'Todos',
      // Informe a las familias
      informeFamilias: { indicadores: [], evaluaciones: [] }
    };

    const COURSES = [
      '1º Infantil','2º Infantil','3º Infantil',
      '1º Primaria','2º Primaria','3º Primaria',
      '4º Primaria','5º Primaria','6º Primaria'
    ];

    const AREAS = [
      'Desarrollo Cognitivo',
      'Desarrollo Comunicativo y Lingüístico',
      'Desarrollo de la Autonomía Personal',
      'Desarrollo Social y Emocional',
      'Desarrollo Psicomotor',
      'Desarrollo Motor'
    ];

    let undoStack = [];
    const MAX_UNDO = 20;

    function pushUndo() {
      undoStack.push({
        studentName: state.studentName,
        course: state.course,
        areas: JSON.parse(JSON.stringify(state.areas)),
        valoracionInicial: state.valoracionInicial,
        seguimiento1T: state.seguimiento1T,
        seguimiento2T: state.seguimiento2T,
        seguimiento3T: state.seguimiento3T,
        informeFamilias: JSON.parse(JSON.stringify(state.informeFamilias))
      });
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      updateUndoButton();
    }

    function undo() {
      if (undoStack.length === 0) return;
      var snapshot = undoStack.pop();
      state.studentName = snapshot.studentName;
      state.course = snapshot.course;
      state.areas = snapshot.areas;
      state.valoracionInicial = snapshot.valoracionInicial;
      state.seguimiento1T = snapshot.seguimiento1T;
      state.seguimiento2T = snapshot.seguimiento2T;
      state.seguimiento3T = snapshot.seguimiento3T;
      state.informeFamilias = snapshot.informeFamilias;
      state.dirty = true;
      updateUndoButton();
      renderFormView();
      showToast('Cambio deshecho', 'info');
    }

    function updateUndoButton() {
      var btn = document.getElementById('btnUndo');
      if (btn) btn.disabled = (undoStack.length === 0);
    }

    let idCounter = 0;
    function uid() { return 'id_' + (++idCounter) + '_' + Math.random().toString(36).substr(2,5); }

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      loadConfig(function() { loadStudentList(); });
    });

    function loadConfig(callback) {
      google.script.run
        .withSuccessHandler(function(cfg) {
          if (cfg) state.config = cfg;
          updateHeaderSubtitle();
          if (callback) callback();
        })
        .withFailureHandler(function() {
          if (callback) callback();
        })
        .getConfig();
    }

    function updateHeaderSubtitle() {
      var sub = document.querySelector('.subtitle');
      if (sub) {
        var parts = [];
        if (state.config.centro) parts.push(state.config.centro);
        if (state.config.localidad) parts.push(state.config.localidad);
        sub.textContent = parts.join(' — ') + (parts.length ? ' · Gestión de programas individualizados' : 'Gestión de programas individualizados');
      }
    }

    function loadStudentList() {
      state.view = 'list';
      renderListView('<div class="loading"><div class="icon">⏳</div>Cargando alumnos...</div>');
      google.script.run
        .withSuccessHandler(function(students) {
          state.students = students || [];
          renderListView();
        })
        .withFailureHandler(function(err) {
          showToast('Error al cargar alumnos: ' + err.message, 'error');
          state.students = [];
          renderListView();
        })
        .getStudentList();
    }

    /* ═══════════════════════════════════════════
       RENDER: Student List
    ═══════════════════════════════════════════ */
    function renderListView(loadingHtml) {
      document.getElementById('btnBack').style.display = 'none';
      document.getElementById('studentBadge').style.display = 'none';
      document.getElementById('bottomBar').style.display = 'none';
      document.getElementById('content').className = 'content';

      if (loadingHtml) {
        document.getElementById('content').innerHTML = loadingHtml;
        return;
      }

      let html = '<div class="card">';
      html += '<div class="student-list-header">';
      html += '<h2><span style="font-size:18px">📋</span> Alumnos (' + state.students.length + ')</h2>';
      html += '<button class="btn-new" onclick="newStudent()">+ Nuevo alumno</button>';
      html += '</div>';
      html += '<div class="student-list-body">';
      html += '<input class="search-input" id="searchInput" type="text" placeholder="🔍 Buscar alumno, curso o programa..." oninput="filterStudents()">';

      // Course filter chips
      var coursesInUse = [];
      state.students.forEach(function(s) {
        if (s.course && coursesInUse.indexOf(s.course) === -1) coursesInUse.push(s.course);
      });
      if (coursesInUse.length > 1) {
        html += '<div class="course-filters" id="courseFilters">';
        html += '<button class="course-chip' + (state.courseFilter === 'Todos' ? ' active' : '') + '" onclick="setCourseFilter(\'Todos\')">Todos</button>';
        coursesInUse.sort().forEach(function(c) {
          html += '<button class="course-chip' + (state.courseFilter === c ? ' active' : '') + '" onclick="setCourseFilter(\'' + escAttr(c) + '\')">' + escHtml(c) + '</button>';
        });
        html += '</div>';
      }

      html += '<div id="studentItems">';
      html += renderStudentItems(getFilteredStudents());
      html += '</div>';
      html += '</div></div>';

      document.getElementById('content').innerHTML = html;
    }

    function renderStudentItems(list) {
      if (list.length === 0) {
        return '<div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px">No hay alumnos registrados aún</div>';
      }
      let html = '';
      list.forEach(function(s) {
        html += '<button class="student-item" onclick="selectStudent(\'' + escHtml(s.name) + '\')">';
        html += '<div><div class="name">' + escHtml(s.name) + '</div>';
        html += '<div class="course">' + escHtml(s.course) + '</div></div>';
        html += '<span class="program-badge">PE</span>';
        html += '</button>';
      });
      return html;
    }

    function getFilteredStudents() {
      var searchEl = document.getElementById('searchInput');
      var q = searchEl ? searchEl.value.toLowerCase() : '';
      return state.students.filter(function(s) {
        var matchesCourse = (state.courseFilter === 'Todos') || (s.course === state.courseFilter);
        var matchesSearch = !q || s.name.toLowerCase().includes(q) || s.course.toLowerCase().includes(q) || s.program.toLowerCase().includes(q);
        return matchesCourse && matchesSearch;
      });
    }

    function filterStudents() {
      document.getElementById('studentItems').innerHTML = renderStudentItems(getFilteredStudents());
    }

    function setCourseFilter(course) {
      state.courseFilter = course;
      // Update active chip
      var chips = document.querySelectorAll('.course-chip');
      chips.forEach(function(chip) {
        chip.classList.toggle('active', chip.textContent === course);
      });
      filterStudents();
    }

    /* ═══════════════════════════════════════════
       ACTIONS: Select / New
    ═══════════════════════════════════════════ */
    function selectStudent(name) {
      if (state.dirty && !confirm('Hay cambios sin guardar. ¿Continuar?')) return;
      undoStack = [];
      state.selectedStudent = name;
      state.isNew = false;
      state.dirty = false;

      document.getElementById('content').innerHTML = '<div class="loading"><div class="icon">⏳</div>Cargando datos de ' + escHtml(name) + '...</div>';
      document.getElementById('btnBack').style.display = '';
      document.getElementById('bottomBar').style.display = 'none';

      google.script.run
        .withSuccessHandler(function(data) {
          if (data) {
            state.studentName = data.studentName;
            state.course = data.course;
            state.valoracionInicial = data.valoracionInicial || '';
            state.seguimiento1T = data.seguimiento1T || '';
            state.seguimiento2T = data.seguimiento2T || '';
            state.seguimiento3T = data.seguimiento3T || '';
            state.areas = (data.areas || []).map(function(a) {
              return {
                name: a.name,
                objectives: a.objectives.map(function(o) {
                  return {
                    id: uid(),
                    title: o.title,
                    indicators: o.indicators.map(function(x) { return { id: uid(), text: x.text, eval1T: x.eval1T || '', eval2T: x.eval2T || '', eval3T: x.eval3T || '', observaciones: x.observaciones || '' }; }),
                    contents: o.contents.map(function(x) { return { id: uid(), text: x.text }; }),
                    activities: o.activities.map(function(x) { return { id: uid(), text: x.text }; })
                  };
                })
              };
            });
            // Load informe familias
            var inf = data.informeFamilias || { indicadores: [], evaluaciones: [] };
            state.informeFamilias = {
              indicadores: (inf.indicadores || []).map(function(x) { return { id: uid(), text: x.text || '' }; }),
              evaluaciones: (inf.evaluaciones || []).map(function(x) { return { eval1T: x.eval1T || '', eval2T: x.eval2T || '', eval3T: x.eval3T || '' }; })
            };
          } else {
            var s = state.students.find(function(st) { return st.name === name; });
            state.studentName = name;
            state.course = s ? s.course : '';
            state.areas = [];
            state.valoracionInicial = '';
            state.seguimiento1T = '';
            state.seguimiento2T = '';
            state.seguimiento3T = '';
            state.informeFamilias = { indicadores: [], evaluaciones: [] };
          }
          state.view = 'form';
          renderFormView();
          showToast('Datos de ' + name + ' cargados', 'success');
        })
        .withFailureHandler(function(err) {
          showToast('Error al cargar: ' + err.message, 'error');
          renderListView();
        })
        .getStudentData(name);
    }

    function newStudent() {
      if (state.dirty && !confirm('Hay cambios sin guardar. ¿Continuar?')) return;
      undoStack = [];
      state.selectedStudent = null;
      state.isNew = true;
      state.dirty = false;
      state.studentName = '';
      state.course = '';
      state.areas = [];
      state.valoracionInicial = '';
      state.seguimiento1T = '';
      state.seguimiento2T = '';
      state.seguimiento3T = '';
      state.informeFamilias = { indicadores: [], evaluaciones: [] };
      state.view = 'form';
      renderFormView();
      showToast('Introduce los datos del nuevo alumno', 'info');
    }

    function goBack() {
      if (state.dirty && !confirm('Hay cambios sin guardar. ¿Volver a la lista?')) return;
      state.dirty = false;
      loadStudentList();
    }

    /* ═══════════════════════════════════════════
       RENDER: Form View
    ═══════════════════════════════════════════ */
    function renderFormView() {
      document.getElementById('btnBack').style.display = '';
      document.getElementById('bottomBar').style.display = '';
      var contentEl = document.getElementById('content');
      contentEl.className = 'content-with-nav';
      updateBadge();

      var selectedAreaNames = state.areas.map(function(a) { return a.name; });

      // ─── Side Nav ───
      var nav = '<nav class="side-nav">';
      nav += '<div class="side-nav-title">Navegación</div>';
      nav += '<a onclick="scrollToId(\'secDatos\')">Datos del alumno</a>';
      state.areas.forEach(function(area, i) {
        var shortName = area.name.replace('Desarrollo ', '');
        var navColor = getAreaColor(area.name);
        nav += '<a class="nav-area" style="border-left:3px solid ' + navColor.border + '" onclick="scrollToId(\'area_' + i + '\')">' + escHtml(shortName) + '</a>';
      });
      nav += '<a class="nav-section" onclick="scrollToId(\'secValoracion\')">Valoración inicial</a>';
      nav += '<a class="nav-section" onclick="scrollToId(\'secSeg1T\')">Seguimiento 1T</a>';
      nav += '<a class="nav-section" onclick="scrollToId(\'secSeg2T\')">Seguimiento 2T</a>';
      nav += '<a class="nav-section" onclick="scrollToId(\'secSeg3T\')">Seguimiento 3T</a>';
      nav += '<a class="nav-section" onclick="scrollToId(\'secInforme\')">Informe familias</a>';
      nav += '</nav>';

      // ─── Main content ───
      let html = nav + '<div class="content-main">';

      // ─── Student Info Card ───
      html += '<div class="card" id="secDatos"><div class="card-body">';
      html += '<div class="card-title"><span class="card-icon">👤</span> Datos del alumno/a</div>';
      html += '<div class="grid-2">';
      html += '<div><label class="field-label">Nombre del alumno/a *</label>';
      html += '<input class="field-input" id="fName" value="' + escAttr(state.studentName) + '" placeholder="Nombre y apellidos" oninput="onFieldChange()" ' + (state.selectedStudent && !state.isNew ? 'readonly' : '') + '></div>';
      html += '<div><label class="field-label">Curso *</label>';
      html += '<select class="field-select" id="fCourse" onchange="onFieldChange()"><option value="">Selecciona curso</option>';
      COURSES.forEach(function(c) { html += '<option value="' + c + '"' + (state.course === c ? ' selected' : '') + '>' + c + '</option>'; });
      html += '</select></div>';
      html += '</div>';

      // Program type (fixed)
      html += '<div style="margin-top:14px">';
      html += '<label class="field-label">Tipo de programa</label>';
      html += '<div style="padding:10px 14px;background:#d1fae5;border-radius:12px;font-weight:700;color:#065f46;font-size:14px">Programa Específico (PE)</div>';
      html += '</div>';

      // Areas (multi-select checkboxes)
      html += '<div style="margin-top:14px">';
      html += '<label class="field-label">Ámbitos de trabajo *</label>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">';
      AREAS.forEach(function(a) {
        var checked = selectedAreaNames.indexOf(a) >= 0;
        html += '<label style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid ' + (checked ? '#2d6a4f' : '#e5e7eb') + ';background:' + (checked ? '#f0fdf4' : '#fff') + ';cursor:pointer;font-size:14px;font-weight:' + (checked ? '700' : '600') + ';transition:all 0.15s">';
        html += '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="toggleArea(\'' + escAttr(a) + '\')" style="accent-color:#2d6a4f;width:18px;height:18px">';
        html += escHtml(a) + '</label>';
      });
      html += '</div></div>';
      html += '</div></div>';

      // ─── Areas with their objectives ───
      state.areas.forEach(function(area, areaIdx) {
        html += renderAreaSection(area, areaIdx);
      });

      // ─── Follow-up fields ───
      var followupFields = [
        { id: 'secValoracion', key: 'valoracionInicial', label: 'Valoración inicial', icon: '📝' },
        { id: 'secSeg1T', key: 'seguimiento1T', label: 'Seguimiento 1er Trimestre', icon: '1T' },
        { id: 'secSeg2T', key: 'seguimiento2T', label: 'Seguimiento 2º Trimestre', icon: '2T' },
        { id: 'secSeg3T', key: 'seguimiento3T', label: 'Seguimiento 3er Trimestre', icon: '3T' }
      ];
      followupFields.forEach(function(f) {
        html += '<div class="followup-card" id="' + f.id + '">';
        html += '<div class="followup-header">' + f.icon + ' ' + escHtml(f.label) + '</div>';
        html += '<div class="followup-body">';
        html += '<div class="richtext-wrap">';
        html += '<div class="richtext-toolbar">';
        html += '<button onmousedown="event.preventDefault();richExec(\'bold\')" title="Negrita"><b>N</b></button>';
        html += '<button onmousedown="event.preventDefault();richExec(\'italic\')" title="Cursiva"><i>K</i></button>';
        html += '<button onmousedown="event.preventDefault();richExec(\'insertUnorderedList\')" title="Viñetas">• Lista</button>';
        html += '</div>';
        html += '<div class="richtext-editor" contenteditable="true" data-key="' + f.key + '" oninput="updateFollowupRich(\'' + f.key + '\',this)" onblur="updateFollowupRich(\'' + f.key + '\',this)">' + (state[f.key] || '') + '</div>';
        html += '</div>';
        html += '</div></div>';
      });

      // ─── Informe a las familias ───
      html += renderInformeFamilias();

      html += '</div>'; // close content-main

      contentEl.innerHTML = html;

      // Auto-resize observation textareas
      document.querySelectorAll('.ind-obs-textarea').forEach(function(ta) { autoResize(ta); });
    }

    function scrollToId(id) {
      var el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function updateFollowup(key, value) {
      state[key] = value;
      markDirty();
    }

    function richExec(command) {
      document.execCommand(command, false, null);
    }

    function updateFollowupRich(key, el) {
      state[key] = el.innerHTML;
      markDirty();
    }

    // Color map: area name → {headerBg, objHeaderBg, border}
    var AREA_COLORS = {
      'Desarrollo Cognitivo':                   { headerBg: 'linear-gradient(135deg, #9f1239, #be123c)', objHeaderBg: 'linear-gradient(135deg, #be123c, #e11d48)', border: '#fda4af' },
      'Desarrollo Comunicativo y Lingüístico':  { headerBg: 'linear-gradient(135deg, #1e40af, #2563eb)', objHeaderBg: 'linear-gradient(135deg, #2563eb, #3b82f6)', border: '#93c5fd' },
      'Desarrollo de la Autonomía Personal':    { headerBg: 'linear-gradient(135deg, #166534, #15803d)', objHeaderBg: 'linear-gradient(135deg, #15803d, #16a34a)', border: '#86efac' },
      'Desarrollo Social y Emocional':          { headerBg: 'linear-gradient(135deg, #9d174d, #be185d)', objHeaderBg: 'linear-gradient(135deg, #be185d, #db2777)', border: '#f9a8d4' },
      'Desarrollo Psicomotor':                  { headerBg: 'linear-gradient(135deg, #c2410c, #ea580c)', objHeaderBg: 'linear-gradient(135deg, #ea580c, #f97316)', border: '#fdba74' },
      'Desarrollo Motor':                       { headerBg: 'linear-gradient(135deg, #78350f, #92400e)', objHeaderBg: 'linear-gradient(135deg, #92400e, #a16207)', border: '#fcd34d' }
    };
    var AREA_COLOR_DEFAULT = { headerBg: 'linear-gradient(135deg, #374151, #4b5563)', objHeaderBg: 'linear-gradient(135deg, #4b5563, #6b7280)', border: '#d1d5db' };

    function getAreaColor(areaName) {
      return AREA_COLORS[areaName] || AREA_COLOR_DEFAULT;
    }

    function renderAreaSection(area, areaIdx) {
      var color = getAreaColor(area.name);

      var html = '<div style="margin-top:20px;border:2px solid ' + color.border + ';border-radius:14px;overflow:hidden" id="area_' + areaIdx + '">';
      html += '<div style="background:' + color.headerBg + ';color:#fff;padding:12px 16px;font-weight:800;font-size:15px;display:flex;justify-content:space-between;align-items:center">';
      html += '<span>' + escHtml(area.name) + ' (' + area.objectives.length + ' obj.)</span>';
      html += '</div>';

      area.objectives.forEach(function(obj, i) {
        html += renderObjectiveCard(obj, i, areaIdx, color);
      });

      html += '<button class="btn-add-obj" onclick="addObjective(' + areaIdx + ')" style="border-radius:0;margin-top:0;border:none;border-top:2px dashed ' + color.border + '">+ Añadir objetivo a ' + escHtml(area.name) + '</button>';
      html += '</div>';
      return html;
    }

    function renderObjectiveCard(obj, index, areaIdx, color) {
      var titlePreview = obj.title ? obj.title.substring(0, 55) + (obj.title.length > 55 ? '...' : '') : 'Objetivo ' + (index + 1) + ' — sin título';
      var area = state.areas[areaIdx];
      var canRemove = area.objectives.length > 1;

      var html = '<div class="obj-card" id="obj_' + obj.id + '" style="border-radius:0;border-top:1px solid ' + color.border + '">';

      // Header
      html += '<div class="obj-header" style="background:' + color.objHeaderBg + '" onclick="toggleObjective(\'' + obj.id + '\')">';
      html += '<div style="display:flex;align-items:center;gap:8px;overflow:hidden">';
      html += '<span class="obj-num">' + (index + 1) + '</span>';
      html += '<span class="obj-title-text">' + escHtml(titlePreview) + '</span>';
      html += '</div>';
      html += '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">';
      if (canRemove) {
        html += '<button class="btn-remove-obj" onclick="event.stopPropagation();removeObjective(' + areaIdx + ',\'' + obj.id + '\')">Eliminar</button>';
      }
      html += '<span class="obj-toggle" id="toggle_' + obj.id + '">▾</span>';
      html += '</div></div>';

      // Body
      html += '<div class="obj-body" id="body_' + obj.id + '">';

      // Description
      html += '<div><label class="field-label" style="color:#2d6a4f">Descripción del objetivo</label>';
      html += '<textarea class="list-textarea" rows="3" style="width:100%" placeholder="Ej: Mejorar la capacidad del alumno para mantener la atención..." oninput="updateObjTitle(\'' + obj.id + '\',this.value)">' + escHtml(obj.title) + '</textarea></div>';

      // Indicators
      html += '<div class="section section-indicators">';
      html += '<div class="section-label">Indicadores de evaluación</div>';
      html += renderDynamicList(obj.id, 'indicators', obj.indicators, 'Ej: Mantiene la atención durante 10-15 min...');
      html += '</div>';

      // Contents
      html += '<div class="section section-contents">';
      html += '<div class="section-label">Contenidos</div>';
      html += renderDynamicList(obj.id, 'contents', obj.contents, 'Ej: Resolución de problemas, numeración...');
      html += '</div>';

      // Activities
      html += '<div class="section section-activities">';
      html += '<div class="section-label">Actividades</div>';
      html += renderDynamicList(obj.id, 'activities', obj.activities, 'Ej: Subrayado guiado de datos relevantes...');
      html += '</div>';

      html += '</div></div>';
      return html;
    }

    function renderDynamicList(objId, listType, items, placeholder) {
      var isIndicator = (listType === 'indicators');
      var html = '';
      if (isIndicator && items.length > 0) {
        html += '<div style="display:flex;justify-content:flex-end;gap:4px;margin-bottom:4px;padding-right:38px">';
        html += '<span class="eval-label" style="width:56px">1T</span>';
        html += '<span class="eval-label" style="width:56px">2T</span>';
        html += '<span class="eval-label" style="width:56px">3T</span>';
        html += '</div>';
      }
      items.forEach(function(item, idx) {
        html += '<div class="list-item">';
        html += '<span class="list-num">' + (idx + 1) + '</span>';
        html += '<textarea class="list-textarea" rows="2" placeholder="' + escAttr(placeholder) + '" oninput="updateListItem(\'' + objId + '\',\'' + listType + '\',\'' + item.id + '\',this.value)">' + escHtml(item.text) + '</textarea>';
        if (isIndicator) {
          html += '<div class="eval-group">';
          html += renderEvalSelect(objId, item.id, '1T', item.eval1T || '');
          html += renderEvalSelect(objId, item.id, '2T', item.eval2T || '');
          html += renderEvalSelect(objId, item.id, '3T', item.eval3T || '');
          html += '</div>';
        }
        if (items.length > 1) {
          html += '<button class="btn-remove-item" onclick="removeListItem(\'' + objId + '\',\'' + listType + '\',\'' + item.id + '\')">×</button>';
        }
        html += '</div>';
        if (isIndicator) {
          html += '<div style="margin-left:28px;margin-bottom:8px">';
          html += '<textarea class="ind-obs-textarea" placeholder="Observaciones del indicador..." oninput="autoResize(this);updateIndicatorObs(\'' + objId + '\',\'' + item.id + '\',this.value)">' + escHtml(item.observaciones || '') + '</textarea>';
          html += '</div>';
        }
      });

    }

    function renderEvalSelect(objId, itemId, trimester, value) {
      var cls = 'eval-select';
      if (value === 'NI') cls += ' eval-ni';
      else if (value === 'EP') cls += ' eval-ep';
      else if (value === 'C') cls += ' eval-c';
      var html = '<select class="' + cls + '" onchange="updateEval(\'' + objId + '\',\'' + itemId + '\',\'' + trimester + '\',this)">';
      html += '<option value=""' + (!value ? ' selected' : '') + '>—</option>';
      html += '<option value="NI"' + (value === 'NI' ? ' selected' : '') + '>NI</option>';
      html += '<option value="EP"' + (value === 'EP' ? ' selected' : '') + '>EP</option>';
      html += '<option value="C"' + (value === 'C' ? ' selected' : '') + '>C</option>';
      html += '</select>';
      return html;
    }

    function updateEval(objId, itemId, trimester, selectEl) {
      var found = findObjInAreas(objId);
      if (found) {
        var item = found.obj.indicators.find(function(i) { return i.id === itemId; });
        if (item) {
          var key = 'eval' + trimester;
          item[key] = selectEl.value;
          // Update visual class
          selectEl.className = 'eval-select';
          if (selectEl.value === 'NI') selectEl.className += ' eval-ni';
          else if (selectEl.value === 'EP') selectEl.className += ' eval-ep';
          else if (selectEl.value === 'C') selectEl.className += ' eval-c';
          markDirty();
        }
      }
    }

    /* ═══════════════════════════════════════════
       FORM ACTIONS
    ═══════════════════════════════════════════ */
    function onFieldChange() {
      state.studentName = document.getElementById('fName').value;
      state.course = document.getElementById('fCourse').value;
      markDirty();
    }

    function toggleArea(areaName) {
      pushUndo();
      var idx = -1;
      for (var i = 0; i < state.areas.length; i++) {
        if (state.areas[i].name === areaName) { idx = i; break; }
      }
      if (idx >= 0) {
        // Remove area (will lose its objectives)
        if (!state.areas[idx].objectives.some(function(o) { return o.title.trim(); }) || confirm('¿Eliminar el ámbito "' + areaName + '" y sus objetivos?')) {
          state.areas.splice(idx, 1);
        }
      } else {
        // Add area with one empty objective
        state.areas.push({ name: areaName, objectives: [createEmptyObjective()] });
      }
      markDirty();
      renderFormView();
    }

    function markDirty() {
      state.dirty = true;
      updateBadge();
    }

    function updateBadge() {
      var badge = document.getElementById('studentBadge');
      var dirty = document.getElementById('badgeDirty');
      if (state.view === 'form' && (state.selectedStudent || state.studentName)) {
        badge.style.display = '';
        document.getElementById('badgeName').textContent = state.studentName || state.selectedStudent || 'Nuevo alumno';
        var areaNames = state.areas.map(function(a) { return a.name; }).join(', ');
        document.getElementById('badgeMeta').textContent = (state.course || '—') + ' · PE' + (areaNames ? ' · ' + areaNames : '');
        dirty.style.display = state.dirty ? '' : 'none';
      } else {
        badge.style.display = 'none';
      }
    }

    function toggleObjective(objId) {
      var body = document.getElementById('body_' + objId);
      var toggle = document.getElementById('toggle_' + objId);
      if (body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        toggle.classList.remove('collapsed');
      } else {
        body.classList.add('hidden');
        toggle.classList.add('collapsed');
      }
    }

    function findObjInAreas(objId) {
      for (var a = 0; a < state.areas.length; a++) {
        var obj = state.areas[a].objectives.find(function(o) { return o.id === objId; });
        if (obj) return { area: state.areas[a], obj: obj };
      }
      return null;
    }

    function updateObjTitle(objId, value) {
      var found = findObjInAreas(objId);
      if (found) { found.obj.title = value; markDirty(); }
    }

    function updateListItem(objId, listType, itemId, value) {
      var found = findObjInAreas(objId);
      if (found) {
        var item = found.obj[listType].find(function(i) { return i.id === itemId; });
        if (item) { item.text = value; markDirty(); }
      }
    }

    function updateIndicatorObs(objId, itemId, value) {
      var found = findObjInAreas(objId);
      if (found) {
        var item = found.obj.indicators.find(function(i) { return i.id === itemId; });
        if (item) { item.observaciones = value; markDirty(); }
      }
    }

    function addListItem(objId, listType) {
      var found = findObjInAreas(objId);
      if (found) {
        var newItem = { id: uid(), text: '' };
        if (listType === 'indicators') newItem.observaciones = '';
        found.obj[listType].push(newItem);
        markDirty();
        renderFormView();
      }
    }

    function removeListItem(objId, listType, itemId) {
      var found = findObjInAreas(objId);
      if (found && found.obj[listType].length > 1) {
        pushUndo();
        found.obj[listType] = found.obj[listType].filter(function(i) { return i.id !== itemId; });
        markDirty();
        renderFormView();
      }
    }

    function addObjective(areaIdx) {
      state.areas[areaIdx].objectives.push(createEmptyObjective());
      markDirty();
      renderFormView();
      showToast('Objetivo añadido', 'success');
    }

    function removeObjective(areaIdx, objId) {
      var area = state.areas[areaIdx];
      if (area.objectives.length <= 1) return;
      if (!confirm('¿Eliminar este objetivo?')) return;
      pushUndo();
      area.objectives = area.objectives.filter(function(o) { return o.id !== objId; });
      markDirty();
      renderFormView();
    }

    function createEmptyObjective() {
      return {
        id: uid(),
        title: '',
        indicators: [{ id: uid(), text: '', observaciones: '' }],
        contents: [{ id: uid(), text: '' }],
        activities: [{ id: uid(), text: '' }]
      };
    }

    /* ─── Informe a las familias ─── */
    var INFORME_LEVELS = [

      { key: 'positivo', label: 'Evoluciona positivamente', emoji: '\uD83D\uDE0A' },
      { key: 'regular', label: 'Regular', emoji: '\uD83D\uDE10' },

    function addInformeIndicador() {
      pushUndo();
      state.informeFamilias.indicadores.push({ id: uid(), text: '' });
      state.informeFamilias.evaluaciones.push({ eval1T: '', eval2T: '', eval3T: '' });
      markDirty();
      renderFormView();
    }

    function removeInformeIndicador(idx) {
      if (state.informeFamilias.indicadores.length <= 1) return;
      pushUndo();
      state.informeFamilias.indicadores.splice(idx, 1);
      state.informeFamilias.evaluaciones.splice(idx, 1);
      markDirty();
      renderFormView();
    }

    function updateInformeIndicador(idx, value) {
      state.informeFamilias.indicadores[idx].text = value;
      markDirty();
    }

    function setInformeLevel(idx, trimester, level) {
      if (!state.informeFamilias.evaluaciones[idx]) {
        state.informeFamilias.evaluaciones[idx] = { eval1T: '', eval2T: '', eval3T: '' };
      }
      var ev = state.informeFamilias.evaluaciones[idx];
      var key = 'eval' + trimester;
      // Toggle off if already selected
      ev[key] = (ev[key] === level) ? '' : level;
      markDirty();
      renderFormView();
    }

    function clearForm() {
      if (!confirm('¿Borrar todos los cambios del formulario?')) return;
      pushUndo();
      state.areas = state.areas.map(function(a) { return { name: a.name, objectives: [createEmptyObjective()] }; });
      if (state.isNew) {
        state.studentName = '';
        state.course = '';
        state.areas = [];
        state.valoracionInicial = '';
        state.seguimiento1T = '';
        state.seguimiento2T = '';
        state.seguimiento3T = '';
        state.informeFamilias = { indicadores: [], evaluaciones: [] };
      }
      state.dirty = false;
      renderFormView();
      showToast('Formulario limpiado', 'info');
    }

    /* ═══════════════════════════════════════════
       SAVE
    ═══════════════════════════════════════════ */
    function saveData() {
      // Read latest field values
      state.studentName = document.getElementById('fName').value.trim();
      state.course = document.getElementById('fCourse').value;

      if (!state.studentName) { showToast('Introduce el nombre del alumno/a', 'error'); return; }
      if (!state.course) { showToast('Selecciona un curso', 'error'); return; }
      if (state.areas.length === 0) { showToast('Selecciona al menos un ámbito', 'error'); return; }

      state.saving = true;
      var btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Guardando...';

      // Read rich text follow-up fields from contenteditable
      document.querySelectorAll('.richtext-editor').forEach(function(el) {
        var key = el.getAttribute('data-key');
        if (key) state[key] = el.innerHTML;
      });

      var payload = JSON.stringify({
        studentName: state.studentName,
        course: state.course,
        valoracionInicial: state.valoracionInicial,
        seguimiento1T: state.seguimiento1T,
        seguimiento2T: state.seguimiento2T,
        seguimiento3T: state.seguimiento3T,
        informeFamilias: {
          indicadores: state.informeFamilias.indicadores.filter(function(i) { return i.text.trim(); }),
          evaluaciones: state.informeFamilias.evaluaciones
        },
        areas: state.areas.map(function(area) {
          return {
            name: area.name,
            objectives: area.objectives.map(function(o) {
              return {
                title: o.title,
                indicators: o.indicators.filter(function(i) { return i.text.trim(); }).map(function(i) {
                  return { text: i.text, eval1T: i.eval1T || '', eval2T: i.eval2T || '', eval3T: i.eval3T || '', observaciones: i.observaciones || '' };
                }),
                contents: o.contents.filter(function(c) { return c.text.trim(); }),
                activities: o.activities.filter(function(a) { return a.text.trim(); })
              };
            })
          };
        })
      });

      google.script.run
        .withSuccessHandler(function(result) {
          state.saving = false;
          state.dirty = false;
          state.selectedStudent = state.studentName;
          state.isNew = false;

          // Update local students list
          var areaStr = state.areas.map(function(a) { return a.name; }).join(', ');
          var existing = state.students.find(function(s) { return s.name === state.studentName; });
          if (!existing) {
            state.students.push({ name: state.studentName, course: state.course, program: 'PE', area: areaStr });
          } else {
            existing.course = state.course;
            existing.program = 'PE';
            existing.area = areaStr;
          }

          btn.disabled = false;
          btn.innerHTML = '💾 Guardar';
          updateBadge();
          showToast('Datos guardados en Google Sheets ✓', 'success');
        })
        .withFailureHandler(function(err) {
          state.saving = false;
          btn.disabled = false;
          btn.innerHTML = '💾 Guardar';
          showToast('Error al guardar: ' + err.message, 'error');
        })
        .saveStudentData(payload);
    }

            var val = ev['eval' + tri.key] || '';
            html += '<tr><td style="font-weight:600">' + (idx + 1) + '.- ' + escHtml(ind.text) + '</td>';
            ['muybien', 'positivo', 'regular', 'mejorar'].forEach(function(lk) {
              html += '<td style="text-align:center">' + (val === lk ? '✔' : '') + '</td>';
            });
            html += '</tr>';
          });
          html += '</table>';
        });
      }

      // Signature
      html += '<div style="margin-top:30px;display:flex;justify-content:space-between;font-size:12px;color:#6b7280">';
      html += '<div style="text-align:center;width:45%"><div style="border-top:1px solid #9ca3af;padding-top:6px;margin-top:60px">Firma del especialista</div></div>';
      html += '<div style="text-align:center;width:45%"><div style="border-top:1px solid #9ca3af;padding-top:6px;margin-top:60px">Firma del tutor/a</div></div>';
      html += '</div>';

      html += '</div></div></div>';

      // Insert overlay
      var overlay = document.createElement('div');
      overlay.id = 'printOverlayWrapper';
      overlay.innerHTML = html;
      document.body.appendChild(overlay);
    }

    function closePrint() {
      var wrapper = document.getElementById('printOverlayWrapper');
      if (wrapper) wrapper.remove();
    }

    /* ═══════════════════════════════════════════
       SETTINGS PANEL
    ═══════════════════════════════════════════ */
    function openSettings() {
      var c = state.config;
      var html = '<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">';
      html += '<div class="settings-panel">';
      html += '<div class="settings-header"><span>⚙ Ajustes del centro</span><button style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer" onclick="closeSettings()">×</button></div>';
      html += '<div class="settings-body">';
      html += '<div><label class="field-label">Centro educativo</label>';
      html += '<input class="field-input" id="cfgCentro" value="' + escAttr(c.centro || '') + '" placeholder="Ej: CEIP Carlos III"></div>';
      html += '<div><label class="field-label">Localidad</label>';
      html += '<input class="field-input" id="cfgLocalidad" value="' + escAttr(c.localidad || '') + '" placeholder="Ej: La Carlota"></div>';
      html += '<div><label class="field-label">Curso escolar</label>';
      html += '<input class="field-input" id="cfgCurso" value="' + escAttr(c.cursoEscolar || '') + '" placeholder="Ej: 2025/2026 (vacío = automático)"></div>';
      html += '</div>';
      html += '<div class="settings-footer">';
      html += '<button class="btn btn-secondary" onclick="closeSettings()">Cancelar</button>';
      html += '<button class="btn btn-primary" id="btnSaveConfig" onclick="saveConfigFromUI()">Guardar</button>';
      html += '</div></div></div>';

      var wrapper = document.createElement('div');
      wrapper.id = 'settingsWrapper';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);
    }

    function closeSettings() {
      var w = document.getElementById('settingsWrapper');
      if (w) w.remove();
    }

    function saveConfigFromUI() {
      var payload = {
        centro: document.getElementById('cfgCentro').value.trim(),
        localidad: document.getElementById('cfgLocalidad').value.trim(),
        cursoEscolar: document.getElementById('cfgCurso').value.trim()
      };
      var btn = document.getElementById('btnSaveConfig');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      google.script.run
        .withSuccessHandler(function() {
          state.config.centro = payload.centro;
          state.config.localidad = payload.localidad;
          if (payload.cursoEscolar) state.config.cursoEscolar = payload.cursoEscolar;
          updateHeaderSubtitle();
          closeSettings();
          showToast('Ajustes del centro guardados', 'success');
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = 'Guardar';
          showToast('Error al guardar ajustes: ' + err.message, 'error');
        })
        .saveConfig(JSON.stringify(payload));
    }

    /* ═══════════════════════════════════════════
       UTILS
    ═══════════════════════════════════════════ */
    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function escAttr(str) { return escHtml(str); }

    function getCurrentSchoolYear() {
      var now = new Date();
      var year = now.getFullYear();
      var month = now.getMonth(); // 0-based
      if (month >= 8) { return year + '/' + (year + 1); }
      return (year - 1) + '/' + year;
    }

    var toastTimer = null;
    function showToast(message, type) {
      var t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✓ ' : type === 'error' ? '✗ ' : 'ℹ ') + message;
      t.className = 'toast toast-' + (type || 'info');
      t.style.display = '';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { t.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
